name: Release

on:
    push:
        tags:
            - 'v*'

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    verify:
        name: Verify Repository
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm tsc --noEmit

            - name: Lint
              run: pnpm lint

    build:
        name: Build ${{ matrix.os_label }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 45
        needs: verify
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-latest
                      os_label: macOS
                      arch: x64
                      artifact_name: dmg-x64
                      build_cmd: pnpm exec electron-builder --mac dmg --x64 --publish never
                    - runner: macos-latest
                      os_label: macOS
                      arch: arm64
                      artifact_name: dmg-arm64
                      build_cmd: pnpm exec electron-builder --mac dmg --arm64 --publish never
                    - runner: windows-latest
                      os_label: Windows
                      arch: x64
                      artifact_name: nsis-x64
                      build_cmd: pnpm exec electron-builder --win nsis --x64 --publish never

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build app
              run: pnpm build:ci
              env:
                  PATREON_CLIENT_ID: ${{ secrets.PATREON_CLIENT_ID }}
                  PATREON_CLIENT_SECRET: ${{ secrets.PATREON_CLIENT_SECRET }}

            - name: Package (${{ matrix.arch }})
              run: ${{ matrix.build_cmd }}
              env:
                  CSC_IDENTITY_AUTO_DISCOVERY: false

            - name: Create SHA256 checksums (macOS)
              if: runner.os == 'macOS'
              run: |
                  cd release
                  find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
                    | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

            - name: Create SHA256 checksums (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  cd release
                  Get-ChildItem -Depth 0 -File | Where-Object { $_.Name -ne 'SHA256SUMS.txt' } | `
                    ForEach-Object { (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower() + "  " + $_.Name } | `
                    Sort-Object | Set-Content SHA256SUMS.txt

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: release/
                  if-no-files-found: error
                  retention-days: 14

    publish:
        name: Publish Release
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build
        permissions:
            contents: write

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts
                  merge-multiple: true

            - name: List release files
              run: ls -lh release-artifacts/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Patreon Mailing ${{ github.ref_name }}
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  body: |
                      ## Download

                      | Platform | Architecture | File |
                      |----------|-------------|------|
                      | macOS | Apple Silicon (M1/M2/M3) | `Patreon.Mailing-*-arm64.dmg` |
                      | macOS | Intel | `Patreon.Mailing-*-x64.dmg` |
                      | Windows | x64 | `Patreon.Mailing-*-x64.exe` |

                      > **macOS note:** The app is unsigned. Right-click the `.dmg` → **Open** → confirm in the dialog.
                      > Or run: `xattr -dr com.apple.quarantine /Applications/Patreon\ Mailing.app`

                      > **Windows note:** The installer is unsigned. Click **More info** → **Run anyway** in the SmartScreen dialog.

                      ## Checksums

                      SHA256 checksums are included in `SHA256SUMS.txt` above.
                  files: |
                      release-artifacts/*.dmg
                      release-artifacts/*.dmg.blockmap
                      release-artifacts/*.exe
                      release-artifacts/*.exe.blockmap
                      release-artifacts/SHA256SUMS.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}