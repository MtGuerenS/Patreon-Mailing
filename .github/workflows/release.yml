name: Release

on:
    push:
        tags:
            - 'v*'

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    verify:
        name: Verify Repository
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm tsc --noEmit

            - name: Lint
              run: pnpm lint

    build:
        name: Build macOS (${{ matrix.arch }})
        runs-on: macos-latest
        timeout-minutes: 45
        needs: verify
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x64
                      artifact_name: dmg-x64
                    - arch: arm64
                      artifact_name: dmg-arm64

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build app
              run: pnpm build:ci

            - name: Package (${{ matrix.arch }})
              run: pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --publish never
              env:
                  CSC_IDENTITY_AUTO_DISCOVERY: false

            - name: Create SHA256 checksums
              run: |
                  cd release
                  find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
                    | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: release/
                  if-no-files-found: error
                  retention-days: 14

    publish:
        name: Publish Release
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build
        permissions:
            contents: write

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts
                  merge-multiple: true

            - name: List release files
              run: ls -lh release-artifacts/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Patreon Mailing ${{ github.ref_name }}
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  body: |
                      ## Download

                      | Platform | Architecture | File |
                      |----------|-------------|------|
                      | macOS | Apple Silicon (M1/M2/M3) | `Patreon.Mailing-*-arm64.dmg` |
                      | macOS | Intel | `Patreon.Mailing-*-x64.dmg` |

                      > **macOS note:** The app is unsigned. Right-click the `.dmg` → **Open** → confirm in the dialog.
                      > Or run: `xattr -dr com.apple.quarantine /Applications/Patreon\ Mailing.app`

                      ## Checksums

                      SHA256 checksums are included in `SHA256SUMS.txt` above.
                  files: release-artifacts/**
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}